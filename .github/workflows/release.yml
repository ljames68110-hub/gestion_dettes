name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          rm -rf dist build
          pyinstaller --onefile main.py --name gestion_dettes
          ls -la dist

      - name: Prepare asset name
        id: asset
        run: |
          # Public asset name used in release and latest.json
          echo "asset_name=gestion_dettes.exe" >> $GITHUB_OUTPUT

      - name: Ensure asset has .exe name
        run: |
          if [ -f dist/gestion_dettes ]; then
            mv dist/gestion_dettes dist/gestion_dettes.exe
          fi

      - name: Create or update release and upload asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/gestion_dettes.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum dist/gestion_dettes.exe | awk '{print $1}' > sha256.txt
          echo "sha=$(cat sha256.txt)" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        id: gen_latest
        run: |
          asset_name="${{ steps.asset.outputs.asset_name }}"
          asset_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${asset_name}"
          sha=$(cat sha256.txt)
          cat > latest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "asset_url": "${asset_url}",
            "sha256": "${sha}"
          }
          EOF
          cat latest.json

      - name: Commit latest.json to a PR
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update latest.json for ${{ github.ref_name }}"
          branch: "update-latest-${{ github.ref_name }}"
          title: "Update latest.json for ${{ github.ref_name }}"
          body: "Automated update of latest.json"
          base: main
          path: latest.json