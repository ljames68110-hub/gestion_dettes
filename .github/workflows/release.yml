- name: Create GitHub Release via REST API
  id: create_release
  shell: bash
  env:
    REPO: ${{ github.repository }}
    TAG: ${{ steps.tag_check.outputs.tag }}
    TOKEN: ${{ secrets.RELEASE_PAT }}
  run: |
    echo "Creating release for $REPO tag $TAG"
    body=$(printf '{"tag_name":"%s","name":"%s","draft":false,"prerelease":false}' "$TAG" "$TAG")
    resp=$(curl -s -X POST -H "Authorization: token $TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/releases" -d "$body")
    echo "$resp" > /tmp/release_resp.json
    upload_url=$(python - <<'PY'
import json,sys
try:
    r=json.load(open('/tmp/release_resp.json'))
    print(r.get('upload_url') or '')
except Exception:
    sys.exit(1)
PY
)
    if [ -z "$upload_url" ]; then
      echo "Release creation failed. Response:"
      cat /tmp/release_resp.json
      exit 1
    fi
    # strip the template part {?name,label}
    upload_url=${upload_url%\{*}
    echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

- name: Upload exe to release via curl
  if: ${{ steps.create_release.outputs.upload_url != '' }}
  shell: bash
  env:
    TOKEN: ${{ secrets.RELEASE_PAT }}
  run: |
    url="${{ steps.create_release.outputs.upload_url }}"
    file="dist/gestion_dettes.exe"
    if [ ! -f "$file" ]; then
      echo "File not found: $file"
      exit 1
    fi
    echo "Uploading $file to $url"
    resp=$(curl -s -X POST -H "Authorization: token $TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$file" "$url?name=gestion_dettes.exe")
    echo "$resp" > /tmp/upload_resp.json
    # quick check for success
    if grep -q '"state":' /tmp/upload_resp.json || grep -q '"browser_download_url"' /tmp/upload_resp.json; then
      echo "Upload response:"
      cat /tmp/upload_resp.json
    else
      echo "Upload failed. Response:"
      cat /tmp/upload_resp.json
      exit 1
    fi

    
