name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (ex: v0.1.5). Leave empty if triggered by tag push.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Show workspace
        run: |
          echo "Working directory:"
          pwd
          echo "List files:"
          ls -la
        shell: bash

      - name: Build exe with PyInstaller
        run: |
          python -m PyInstaller --onefile --name gestion_dettes --clean --log-level=DEBUG main.py

      - name: Fail if no tag provided
        if: ${{ (github.event.inputs.tag || github.ref_name) == '' }}
        run: |
          echo "No tag provided and not a tag push. Aborting."
          exit 1

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload exe to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/gestion_dettes.exe
          asset_name: gestion_dettes.exe
          asset_content_type: application/octet-stream

      - name: Compute sha256 and update latest.json
        shell: pwsh
        run: |
          $exe = "dist\gestion_dettes.exe"
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $repo = "${{ github.repository }}"
          $json = @{
            version = $tag
            url = "https://github.com/$repo/releases/download/$tag/gestion_dettes.exe"
            sha256 = $hash
          } | ConvertTo-Json
          $json | Out-File -Encoding utf8 latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update latest.json for $tag" || Write-Host "No changes to commit"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
