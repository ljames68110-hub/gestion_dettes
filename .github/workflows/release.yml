name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pywebview cryptography pyinstaller

      - name: Verify web folder
        shell: pwsh
        run: |
          if (!(Test-Path "web\index.html")) {
            Write-Error "web/index.html not found!"
            exit 1
          }
          Write-Host "web/index.html found OK"

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name GestionPerso `
            --add-data "web;web" `
            --add-data "db.py;." `
            --add-data "api.py;." `
            --add-data "updater.py;." `
            --add-data "crypto_db.py;." `
            --add-data "app_icon.ico;." `
            --icon "app_icon.ico" `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import sqlite3 `
            --hidden-import hashlib `
            --hidden-import secrets `
            --hidden-import csv `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.ciphers `
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            --collect-all flask `
            --collect-all flask_cors `
            --collect-all webview `
            main.py
          Write-Host "Build OK"
          dir dist

      - name: Compute SHA256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\GestionPerso.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath sha256.txt -Encoding ascii -NoNewline
          echo "sha=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA256: $hash"

      - name: Create Release and upload exe
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/GestionPerso.exe
          artifactContentType: application/octet-stream
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Write-Host "Inno Setup OK"

      - name: Update version in installer script
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.iss) -replace '#define AppVersion "1.0"', "#define AppVersion `"$tag`"" |
            Set-Content installer.iss
          Write-Host "Version set to $tag"

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer_output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Write-Host "Installer built:"
          dir installer_output

      - name: Upload installer to release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: installer_output/GestionPerso_Setup.exe
          artifactContentType: application/octet-stream
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare latest.json
        shell: pwsh
        run: |
          $tag  = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $url  = "https://github.com/$repo/releases/download/$tag/GestionPerso.exe"
          $sha  = (Get-Content sha256.txt -Raw).Trim()
          $obj  = [ordered]@{ version=$tag; asset_url=$url; sha256=$sha }
          $obj | ConvertTo-Json | Out-File -FilePath latest.json -Encoding utf8
          Get-Content latest.json

      - name: Push latest.json directly to main
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git stash
          git checkout main
          git stash pop
          git add latest.json sha256.txt
          git diff --cached --quiet && echo "No changes" || git commit -m "ci: update latest.json for ${{ github.ref_name }} [skip ci]"
          git push origin main
          Write-Host "latest.json pousse sur main directement"
