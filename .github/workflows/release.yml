name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pywebview cryptography pyinstaller

      - name: Verify web folder
        shell: pwsh
        run: |
          if (!(Test-Path "web\index.html")) {
            Write-Error "web/index.html not found!"
            exit 1
          }
          Write-Host "web/index.html found OK"

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name gestion_dettes `
            --add-data "web;web" `
            --add-data "db.py;." `
            --add-data "api.py;." `
            --add-data "updater.py;." `
            --add-data "crypto_db.py;." `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import sqlite3 `
            --hidden-import hashlib `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.ciphers `
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 `
            --hidden-import secrets `
            --hidden-import csv `
            --collect-all flask `
            --collect-all flask_cors `
            --collect-all webview `
            --hidden-import webview `
            --hidden-import webview.platforms.winforms `
            --add-data "app_icon.ico;." `
            --icon "app_icon.ico" `
            main.py
          Write-Host "Build OK"
          dir dist

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          Write-Host "Inno Setup installed"

      - name: Update version in installer script
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.iss) -replace '#define AppVersion "1.0"', "#define AppVersion `"$tag`"" |
            Set-Content installer.iss
          Write-Host "Version set to $tag"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer_output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          Write-Host "Installer built:"
          dir installer_output

      - name: Compute SHA256 of exe
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\gestion_dettes.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath sha256.txt -Encoding ascii -NoNewline
          echo "sha=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "SHA256: $hash"

      - name: Create Release and upload both files
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: |
            dist/gestion_dettes.exe
            installer_output/Gestion Perso_Setup.exe
          artifactContentType: application/octet-stream
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Gestion Perso ${{ github.ref_name }}

            ### Téléchargements
            | Fichier | Description |
            |---------|-------------|
            | `Gestion Perso_Setup.exe` | **Installateur recommandé** — installe l'app, crée un raccourci Bureau/Menu Démarrer, apparaît dans Programmes |
            | `gestion_dettes.exe` | Version portable — double-clic, aucune installation |

            ### Installation
            1. Télécharge `Gestion Perso_Setup.exe`
            2. Double-clique et suis les étapes
            3. L'app se lance automatiquement

            > Tes données (`dettes.db`) sont conservées dans `%APPDATA%\Gestion Perso\` et ne sont pas supprimées lors d'une désinstallation.

      - name: Prepare latest.json
        shell: pwsh
        run: |
          $tag  = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $url  = "https://github.com/$repo/releases/download/$tag/gestion_dettes.exe"
          $sha  = (Get-Content sha256.txt -Raw).Trim()
          $obj  = [ordered]@{ version=$tag; asset_url=$url; sha256=$sha }
          $obj | ConvertTo-Json | Out-File -FilePath latest.json -Encoding utf8
          Get-Content latest.json

      - name: Commit latest.json via PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update latest.json for ${{ github.ref_name }}"
          branch: "update-latest-${{ github.ref_name }}"
          title: "Update latest.json for ${{ github.ref_name }}"
          body: "Automated update of latest.json"
          base: main
          add-paths: |
            latest.json
            sha256.txt
