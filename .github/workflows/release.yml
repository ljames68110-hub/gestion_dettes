name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pyinstaller

      - name: Verify web folder
        shell: pwsh
        run: |
          if (!(Test-Path "web\index.html")) { Write-Error "web/index.html not found!"; exit 1 }
          Write-Host "web/index.html found OK"

      - name: Build exe
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --name gestion_dettes `
            --add-data "web;web" `
            --add-data "db.py;." `
            --add-data "api.py;." `
            --add-data "updater.py;." `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import sqlite3 `
            --hidden-import hashlib `
            --hidden-import secrets `
            --hidden-import csv `
            --collect-all flask `
            --collect-all flask_cors `
            main.py
          dir dist

      - name: Compute SHA256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\gestion_dettes.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath sha256.txt -Encoding ascii -NoNewline
          echo "sha=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release and upload exe
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/gestion_dettes.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $url = "https://github.com/$repo/releases/download/$tag/gestion_dettes.exe"
          $sha = (Get-Content sha256.txt -Raw).Trim()
          $obj = [ordered]@{ version=$tag; asset_url=$url; sha256=$sha }
          $obj | ConvertTo-Json | Out-File -FilePath latest.json -Encoding utf8
          Get-Content latest.json

      - name: Commit latest.json via PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update latest.json for ${{ github.ref_name }}"
          branch: "update-latest-${{ github.ref_name }}"
          title: "Update latest.json for ${{ github.ref_name }}"
          body: "Automated update of latest.json"
          base: main
          add-paths: |
            latest.json
            sha256.txt