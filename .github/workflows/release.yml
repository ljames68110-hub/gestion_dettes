name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          rm -rf dist build
          pyinstaller --onefile main.py --name gestion_dettes
          ls -la dist

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload executable
        id: upload_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/gestion_dettes
          asset_name: gestion_dettes.exe
          asset_content_type: application/octet-stream

      - name: Compute SHA256
        id: sha
        run: |
          sha256sum dist/gestion_dettes | awk '{print $1}' > sha256.txt
          echo "sha=$(cat sha256.txt)" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          cat > latest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "asset_url": "${{ steps.upload_asset.outputs.browser_download_url }}",
            "sha256": "${{ steps.sha.outputs.sha }}"
          }
          EOF
          cat latest.json

      - name: Commit latest.json to a PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update latest.json for ${{ github.ref_name }}"
          branch: "update-latest-${{ github.ref_name }}"
          title: "Update latest.json for ${{ github.ref_name }}"
          body: "Automated update of latest.json"
          base: main
