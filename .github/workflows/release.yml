name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: windows-latest        # exe Windows natif
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors pyinstaller

      - name: Build executable (PyInstaller)
        run: |
          pyinstaller `
            --onefile `
            --name gestion_dettes `
            --add-data "web;web" `
            --add-data "db.py;." `
            --add-data "api.py;." `
            --add-data "updater.py;." `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import sqlite3 `
            main.py
          dir dist

      - name: Compute SHA256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\gestion_dettes.exe -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath sha256.txt -Encoding ascii -NoNewline
          echo "sha=$hash" >> $env:GITHUB_OUTPUT

      - name: Create / update GitHub Release and upload exe
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: dist/gestion_dettes.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare latest.json
        shell: pwsh
        run: |
          $tag       = "${{ github.ref_name }}"
          $repo      = "${{ github.repository }}"
          $assetName = "gestion_dettes.exe"
          $assetUrl  = "https://github.com/$repo/releases/download/$tag/$assetName"
          $sha256    = Get-Content sha256.txt -Raw

          $json = @{
            version   = $tag
            asset_url = $assetUrl
            sha256    = $sha256.Trim()
          } | ConvertTo-Json -Depth 2

          $json | Out-File -FilePath latest.json -Encoding utf8
          Write-Host "latest.json généré :"
          Get-Content latest.json

      - name: Commit latest.json and sha256.txt via PR
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: update latest.json + sha256 for ${{ github.ref_name }}"
          branch: "update-latest-${{ github.ref_name }}"
          title: "Update latest.json for ${{ github.ref_name }}"
          body: |
            Mise à jour automatique de `latest.json` et `sha256.txt` pour la release ${{ github.ref_name }}.
          base: main
          add-paths: |
            latest.json
            sha256.txt