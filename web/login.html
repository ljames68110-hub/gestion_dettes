<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestion Perso</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--gold:#c9a84c;--gold2:#e8c97e;--bg:#0a0a0f;--border:#2a2a3a;--text:#e8e6f0;--text3:#6b6985;}
  html,body{height:100%;}
  body{background:radial-gradient(1100px 560px at 50% -8%,#1a1626,#0a0a0f 60%);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}
  .card{width:380px;max-width:90vw;background:linear-gradient(160deg,#16161f,#0d0d14);border:1px solid var(--border);border-radius:18px;padding:38px 32px;box-shadow:0 30px 80px -30px rgba(0,0,0,.8);text-align:center;}
  .lock{width:64px;height:64px;border-radius:16px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#2a2418,#1a160d);border:1px solid #3a3320;}
  .lock svg{width:30px;height:30px;stroke:var(--gold2);fill:none;stroke-width:2;}
  .brand{font-size:22px;font-weight:700;letter-spacing:.5px;}
  .brand span{background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{font-size:11px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-top:4px;margin-bottom:26px;}
  label{display:block;text-align:left;font-size:12px;color:var(--text3);margin-bottom:8px;}
  input{width:100%;padding:13px 14px;border-radius:11px;border:1px solid var(--border);background:#0f0f17;color:var(--text);font-size:16px;outline:none;transition:border-color .15s,box-shadow .15s;}
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18);}
  button{width:100%;margin-top:18px;padding:13px;border:none;border-radius:11px;cursor:pointer;font-size:15px;font-weight:600;font-family:inherit;color:#1a1408;background:linear-gradient(180deg,var(--gold2),var(--gold));transition:filter .15s,transform .1s;}
  button:hover{filter:brightness(1.06);}
  button:active{transform:translateY(1px);}
  button:disabled{opacity:.6;cursor:default;}
  .err{color:#ff6f5e;font-size:13px;margin-top:14px;min-height:18px;}
</style>
</head>
<body>
  <div class="card">
    <div class="lock"><svg viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="9" rx="2"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg></div>
    <div class="brand">Gestion <span>Perso</span></div>
    <div class="sub">Premium</div>
    <label for="pwd">Mot de passe</label>
    <input id="pwd" type="password" autocomplete="off" placeholder="Votre mot de passe">
    <button id="btn">Deverrouiller</button>
    <div class="err" id="err"></div>
  </div>
<script>
  var btn=document.getElementById('btn'),pwd=document.getElementById('pwd'),err=document.getElementById('err');
  var busy=false;
  function gpapi(){return (window.pywebview&&window.pywebview.api)?window.pywebview.api:null;}
  async function submit(){
    if(busy)return;
    var p=pwd.value;
    if(!p){err.textContent='Entre ton mot de passe';return;}
    var a=gpapi();
    if(!a){err.textContent='Initialisation... reessaie dans une seconde';return;}
    busy=true;btn.disabled=true;btn.textContent='Deverrouillage...';err.textContent='';
    try{
      var r=await a.try_unlock(p);
      if(r&&r.ok){btn.textContent='Ouverture...';}
      else{err.textContent=(r&&r.error)||'Mot de passe incorrect';busy=false;btn.disabled=false;btn.textContent='Deverrouiller';try{pwd.select();}catch(e){}}
    }catch(e){err.textContent='Erreur: '+e;busy=false;btn.disabled=false;btn.textContent='Deverrouiller';}
  }
  btn.addEventListener('click',submit);
  pwd.addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
  window.addEventListener('pywebviewready',function(){try{pwd.focus();}catch(e){}});
  setTimeout(function(){try{pwd.focus();}catch(e){}},200);
</script>
</body>
</html>
