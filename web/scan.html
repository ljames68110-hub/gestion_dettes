<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Scan - Gestion Perso</title>
<script src="/html5-qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0a0a0f;color:#e8e6f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px;}
  h1{font-size:18px;font-weight:700;margin:4px 0 2px;}
  h1 span{color:#e8c97e;}
  .sub{font-size:12px;color:#6b6985;margin-bottom:12px;text-align:center;}
  #reader{width:100%;max-width:440px;border-radius:14px;overflow:hidden;border:1px solid #2a2a3a;background:#000;}
  button{margin-top:14px;padding:13px 20px;border:none;border-radius:12px;font-size:15px;font-weight:600;color:#1a1408;background:linear-gradient(180deg,#e8c97e,#c9a84c);cursor:pointer;}
  button.sec{background:#16161f;color:#e8e6f0;border:1px solid #2a2a3a;}
  .hit{margin-top:14px;min-height:48px;width:100%;max-width:440px;text-align:center;}
  .code{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:#7ee0a0;}
  .ok{font-size:12px;color:#7ee0a0;margin-top:2px;}
  .err2{font-size:12px;color:#ff6f5e;margin-top:2px;}
  .err{color:#ff6f5e;font-size:13px;margin-top:10px;text-align:center;max-width:440px;}
  .manual{margin-top:18px;width:100%;max-width:440px;display:flex;gap:8px;}
  .manual input{flex:1;padding:12px;border-radius:10px;border:1px solid #2a2a3a;background:#0f0f17;color:#e8e6f0;font-size:16px;}
  .manual button{margin-top:0;}
  .count{font-size:11px;color:#e8c97e;margin-top:4px;}
</style>
</head>
<body>
  <h1>Gestion <span>Perso</span> - Scan</h1>
  <div class="sub">Vise un code-barres : il part dans la caisse du PC.</div>
  <div id="reader"></div>
  <button id="startBtn">Demarrer la camera</button>
  <button id="stopBtn" class="sec" style="display:none">Arreter</button>
  <div class="hit" id="hit"></div>
  <div class="err" id="err"></div>
  <div class="manual">
    <input id="manualCode" type="text" inputmode="numeric" placeholder="Saisir un code a la main">
    <button onclick="sendManual()">Envoyer</button>
  </div>
<script>
  var reader=null, running=false, lastCode='', lastT=0, total=0;
  var hit=document.getElementById('hit'), errEl=document.getElementById('err');
  var startBtn=document.getElementById('startBtn'), stopBtn=document.getElementById('stopBtn');
  async function send(code){
    code=(code||'').trim(); if(!code)return;
    total++;
    try{
      var r=await fetch('/api/scan-push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})});
      var d=await r.json();
      hit.innerHTML='<div class="code">'+code+'</div><div class="ok">Recu par le PC'+(d&&d.ok?' OK':'')+'</div><div class="count">'+total+' envoi(s)</div>';
    }catch(e){
      hit.innerHTML='<div class="code">'+code+'</div><div class="err2">Echec envoi: '+e+'</div>';
    }
    if(navigator.vibrate)try{navigator.vibrate(80);}catch(e){}
  }
  function onScan(text){
    var now=Date.now();
    if(text===lastCode && now-lastT<2500) return;
    lastCode=text; lastT=now;
    send(text);
  }
  function sendManual(){
    var el=document.getElementById('manualCode');
    if(el&&el.value.trim()){send(el.value.trim());el.value='';}
  }
  function start(){
    errEl.textContent='';
    if(!window.Html5Qrcode){errEl.textContent='Librairie non chargee.';return;}
    reader=new Html5Qrcode("reader",{useBarCodeDetectorIfSupported:true});
    reader.start({facingMode:"environment"},{fps:10},onScan,function(){})
      .then(function(){running=true;startBtn.style.display='none';stopBtn.style.display='inline-block';})
      .catch(function(e){errEl.textContent='Camera impossible: '+e+' (autorise la camera et accepte le certificat). Tu peux saisir le code a la main ci-dessous.';});
  }
  function stop(){
    if(reader&&running){reader.stop().then(function(){reader.clear();running=false;startBtn.style.display='inline-block';stopBtn.style.display='none';}).catch(function(){});}
  }
  startBtn.addEventListener('click',start);
  stopBtn.addEventListener('click',stop);
  document.getElementById('manualCode').addEventListener('keydown',function(e){if(e.key==='Enter')sendManual();});
</script>
</body>
</html>
